services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow_data
      - ./mlruns:/app/mlruns        # <--- AJOUT CRUCIAL : On monte la DB
    working_dir: /app               # On définit le dossier de travail
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlruns/mlflow.db
      --default-artifact-root /mlflow_data
      --host 0.0.0.0
    networks:
      - churn_network

  api:
    build: .
    container_name: churnguard_api
    ports:
      - "8000:8000"
    volumes:
      - ./mlflow_data:/mlflow_data 
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - churn_network

networks:
  churn_network:
    driver: bridge