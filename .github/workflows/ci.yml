name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install ruff
      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install mypy pandas mlflow fastapi pydantic pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Mypy
        # On vérifie la racine et le dossier tests
        run: mypy . --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . || true # Installe le projet en mode éditable pour les imports
      - name: Run tests with coverage
        # --cov=. indique de calculer la couverture sur tout le dossier
        # --cov-report=term-missing affiche les lignes non testées dans les logs
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=70

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t churnguard-api:latest .
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'churnguard-api:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'